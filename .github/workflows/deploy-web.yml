name: Deploy Web

run-name: Deploy web from ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - packages/shared/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-web.yml

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Vercel production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment_url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${VERCEL_TOKEN}" ]] || missing+=("VERCEL_TOKEN")
          [[ -n "${VERCEL_ORG_ID}" ]] || missing+=("VERCEL_ORG_ID")
          [[ -n "${VERCEL_PROJECT_ID}" ]] || missing+=("VERCEL_PROJECT_ID")

          if (( ${#missing[@]} > 0 )); then
            echo "::error title=Missing Vercel secrets::Add these GitHub repository secrets before deploying: ${missing[*]}"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Validate workspace before deploy
        run: corepack pnpm validate

      - name: Deploy web to Vercel
        id: deploy
        run: |
          set -euo pipefail

          deploy_json="$(corepack pnpm dlx vercel deploy --prod --yes --token="$VERCEL_TOKEN" --format=json)"
          printf '%s' "$deploy_json" > deploy-result.json

          deployment_url="$(printf '%s' "$deploy_json" | node -e 'let input=""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => { const result = JSON.parse(input); const url = result.url; if (!url) { process.exit(1); } console.log(url.startsWith("http") ? url : `https://${url}`); });')"

          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"

      - name: Verify deployed site responds
        run: |
          set -euo pipefail

          for attempt in {1..12}; do
            if curl --silent --show-error --fail --location --max-time 20 "$DEPLOYMENT_URL" > /dev/null; then
              echo "Deployment responded successfully on attempt $attempt."
              exit 0
            fi

            echo "Deployment not ready yet (attempt $attempt/12). Retrying in 10 seconds..."
            sleep 10
          done

          echo "::error title=Deployment health check failed::The deployed site never returned a successful HTTP response."
          exit 1

      - name: Write deployment summary
        if: success()
        run: |
          {
            echo "## Web deployment succeeded"
            echo ""
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Deployment URL: ${DEPLOYMENT_URL}"
            echo "- Triggered by: \`${GITHUB_ACTOR}\`"
            echo "- Validation: \`corepack pnpm validate\` passed before deploy"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write failure summary
        if: failure()
        run: |
          {
            echo "## Web deployment failed"
            echo ""
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Check the failed workflow logs for the failing step."
            echo "- If deployment reached Vercel, inspect recent releases with \`corepack pnpm dlx vercel ls project-pc0w6\`."
          } >> "$GITHUB_STEP_SUMMARY"